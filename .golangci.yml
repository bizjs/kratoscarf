run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gofmt
    - goimports
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - copyloopvar
    - nilerr
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  goimports:
    local-prefixes: github.com/bizjs/kratoscarf
  errname:
    all: true
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test files are allowed more flexibility
    - path: _test\.go
      linters:
        - errcheck
        - unparam
